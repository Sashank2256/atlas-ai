version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: atlas-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: